<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>π镜界 - 本地测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 36px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin: 10px 0;
        }
        .success {
            color: #10b981;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
        }
        .time {
            color: #9ca3af;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>π镜界</h1>
        <p>🎉 WebView 本地测试成功！</p>
        <p>如果您能看到这个页面，说明 WebView 组件工作正常。</p>
        <div class="success">✅ 测试通过</div>
        <div class="time" id="time"></div>
    </div>
    
    <script>
        function updateTime() {
            document.getElementById('time').textContent = '当前时间：' + new Date().toLocaleString('zh-CN');
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
